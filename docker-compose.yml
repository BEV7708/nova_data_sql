version: '3.9'
services: #сервисы для которых будут создаваться контейнеры
  postgres: # PostgreSQL сервер
    image: postgres:latest #образ, который будет использован для контейнера с базой данных
    container_name: postgresSQL # имя контейнера
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
      TZ: ${TIMEZONE}
    ports:
      - "5432:5432" #порты у контейнера и порты снаружи контейнера (то,как подлючаться к базе данных)
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./backups:/backups
      - ./init-db:/docker-entrypoint-initdb.d
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 4G
    networks:
      - app-network
networks:
  app-network:
    driver: bridge